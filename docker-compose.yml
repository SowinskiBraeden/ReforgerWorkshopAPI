services:
  reforger-workshop-api:
    build: .
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
